<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой GitHub Сайт</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: #1e1e1e;
      font-size: 28px;
      font-weight: bold;
    }

    nav {
      background: #222;
      padding: 15px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      transition: 0.3s;
    }

    nav a:hover {
      color: #00bfff;
    }

    main {
      padding: 80px 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      font-size: 20px;
      color: #ccc;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 25px;
      border: none;
      background: #00bfff;
      color: white;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #009acd;
    }

    footer {
      margin-top: 100px;
      padding: 20px;
      background: #1e1e1e;
      color: #888;
    }
  </style>
</head>

<body>

  <header>
    Мой сайт
  </header>

  <nav>
    <a href="#">Главная</a>
    <a href="#">О сайте</a>
    <a href="#">Контакты</a>
  </nav>

  <main>
    <h1>Привет!</h1>
    <p>Это сайт для GitHub Pages.</p>

    <button onclick="alert('Сайт работает!')">
      Нажми меня
    </button>
  </main>

  <footer>
    © 2026 GitHub Site
  </footer>

</body>
</html>
